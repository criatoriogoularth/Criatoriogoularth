<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Criatório Goularth — Fotos</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d1a16;
  --bg-elevated: #132621;
  --bg-elevated-2: #17302a;
  --brass: #c7973f;
  --brass-soft: #e4c583;
  --brass-dim: rgba(199,151,63,0.28);
  --text: #ece6d6;
  --text-muted: #9aa89e;
  --line: rgba(199,151,63,0.22);
  --radius: 14px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Manrope', sans-serif;
  min-height: 100vh;
}

.site-header {
  background: var(--bg-elevated);
  border-bottom: 1px solid var(--line);
}

.site-nav {
  background: var(--bg-elevated);
  padding: 12px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
  border-bottom: 1px solid var(--line);
}

.site-nav .logo {
  display: flex;
  align-items: center;
  gap: 12px;
}

.site-nav .logo .mark {
  border-radius: 50%;
  border: 2px solid var(--brass);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Fraunces', serif;
  font-weight: 700;
  color: var(--brass-soft);
  background: rgba(199,151,63,0.08);
  flex-shrink: 0;
  object-fit: cover;
}

.site-nav .logo .mark img {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  object-fit: cover;
}

.site-nav .logo .name {
  font-family: 'Fraunces', serif;
  font-weight: 700;
  color: var(--brass-soft);
}

.site-nav .logo .sub {
  font-size: 10px;
  color: var(--text-muted);
  display: block;
}

.nav-links {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  align-items: center;
}

.nav-links a {
  color: var(--text-muted);
  text-decoration: none;
  padding: 8px 14px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  transition: .15s ease;
  border: 1px solid transparent;
}

.nav-links a:hover {
  color: var(--text);
  background: rgba(199,151,63,0.08);
  border-color: var(--brass-dim);
}

.nav-links a.active {
  color: var(--brass-soft);
  background: rgba(199,151,63,0.12);
  border-color: var(--brass);
}

.nav-buttons {
  display: flex;
  gap: 6px;
  align-items: center;
  flex-shrink: 0;
}

.btn-login-site {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: 8px;
  background: rgba(199,151,63,0.12);
  border: 1px solid var(--brass-dim);
  color: var(--brass-soft);
  text-decoration: none;
  font-weight: 600;
  font-size: 13px;
  transition: .15s ease;
}

.btn-login-site:hover {
  background: rgba(199,151,63,0.2);
  border-color: var(--brass);
  transform: scale(1.02);
}

.site-main {
  max-width: 1100px;
  margin: 0 auto;
  padding: 30px 24px 60px;
}

.site-main .subtitle {
  font-size: 14px;
  color: var(--text-muted);
  margin-bottom: 24px;
}

.tabs {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  border-bottom: 2px solid var(--line);
  margin-bottom: 20px;
  padding-bottom: 0;
}

.tabs button {
  background: none;
  border: none;
  color: var(--text-muted);
  font-family: 'Manrope', sans-serif;
  font-size: 15px;
  font-weight: 600;
  padding: 10px 20px;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: .15s ease;
  margin-bottom: -2px;
}

.tabs button:hover {
  color: var(--text);
}

.tabs button.active {
  color: var(--brass-soft);
  border-bottom-color: var(--brass);
}

.tab-content {
  display: none;
}

.tab-content.active {
  display: block;
}

.fotos-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 16px;
}

.foto-item {
  background: var(--bg-elevated-2);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  overflow: hidden;
  transition: .15s ease;
  cursor: pointer;
}

.foto-item:hover {
  border-color: var(--brass-dim);
  transform: translateY(-3px);
}

.foto-item img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  display: block;
}

.foto-item .info {
  padding: 10px 14px;
}

.foto-item .info .titulo {
  font-weight: 600;
  font-size: 14px;
  color: var(--text);
  margin-bottom: 2px;
}

.foto-item .info .descricao {
  font-size: 12px;
  color: var(--text-muted);
}

.foto-item .info .categoria {
  display: inline-block;
  font-size: 10px;
  padding: 2px 10px;
  border-radius: 12px;
  background: rgba(199,151,63,0.12);
  color: var(--brass-soft);
  margin-top: 4px;
}

.empty-fotos {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
  grid-column: 1 / -1;
}

.empty-fotos .icon {
  font-size: 56px;
  margin-bottom: 16px;
  opacity: 0.4;
}

.foto-modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  padding: 20px;
  cursor: pointer;
}

.foto-modal.open {
  display: flex;
}

.foto-modal img {
  max-width: 90%;
  max-height: 85vh;
  object-fit: contain;
  border-radius: 8px;
}

.foto-modal .fechar {
  position: absolute;
  top: 20px;
  right: 30px;
  font-size: 40px;
  color: var(--text-muted);
  cursor: pointer;
  transition: .15s ease;
}

.foto-modal .fechar:hover {
  color: var(--text);
}

.foto-modal .legenda-modal {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  color: var(--text-muted);
  font-size: 16px;
  background: rgba(0,0,0,0.5);
  padding: 8px 20px;
  border-radius: 8px;
  text-align: center;
  max-width: 80%;
}

.site-footer {
  background: var(--bg-elevated);
  border-top: 1px solid var(--line);
  padding: 24px;
  text-align: center;
  font-size: 12px;
  color: var(--text-muted);
}

.site-footer .links {
  display: flex;
  justify-content: center;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 8px;
}

.site-footer .links a {
  color: var(--text-muted);
  text-decoration: none;
}

.site-footer .links a:hover {
  color: var(--brass-soft);
}

@media (max-width: 768px) {
  .site-nav {
    flex-direction: column;
    align-items: stretch;
    text-align: center;
    padding: 8px 12px;
  }
  .site-nav .logo {
    justify-content: center;
  }
  .nav-links {
    justify-content: center;
  }
  .nav-buttons {
    justify-content: center;
  }
  .fotos-grid {
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  }
  .foto-item img {
    height: 150px;
  }
  .tabs button {
    font-size: 13px;
    padding: 8px 14px;
  }
}
</style>
</head>
<body>
  <header class="site-header">
    <div class="site-nav">
      <div class="logo" id="logo-section">
        <!-- Preenchido pelo JavaScript -->
      </div>
      <div class="nav-links">
        <a href="site-home.html">Home</a>
        <a href="site-criatorio.html">O Criatório</a>
        <a href="site-noticias.html">Notícias</a>
        <a href="site-plantel.html">Plantel</a>
        <a href="site-adultos.html">Adultos</a>
        <a href="site-filhotes.html">Filhotes</a>
        <a href="site-fotos.html" class="active">Fotos</a>
        <a href="site-videos.html">Vídeos</a>
        <a href="site-contato.html">Contato</a>
      </div>
      <div class="nav-buttons">
        <a href="login.html" class="btn-login-site">🔐 Entrar</a>
      </div>
    </div>
  </header>

  <main class="site-main">
    <div class="subtitle">Galeria de imagens do criatório</div>

    <div class="tabs" id="fotos-tabs">
      <button class="active" data-tab="fotos-criacao" onclick="switchTab('fotos-criacao', this)">📸 Criação</button>
      <button data-tab="fotos-torneios" onclick="switchTab('fotos-torneios', this)">🏆 Torneios</button>
    </div>

    <div class="tab-content active" id="fotos-criacao">
      <div id="fotos-criacao-grid" class="fotos-grid"></div>
    </div>

    <div class="tab-content" id="fotos-torneios">
      <div id="fotos-torneios-grid" class="fotos-grid"></div>
    </div>
  </main>

  <div class="foto-modal" id="foto-modal" onclick="fecharModal()">
    <span class="fechar" onclick="fecharModal()">✕</span>
    <img id="modal-img" src="" alt="">
    <div class="legenda-modal" id="modal-legenda"></div>
  </div>

  <footer class="site-footer">
    <div class="links">
      <a href="site-home.html">Home</a>
      <a href="site-criatorio.html">O Criatório</a>
      <a href="site-noticias.html">Notícias</a>
      <a href="site-plantel.html">Plantel</a>
      <a href="site-adultos.html">Adultos</a>
      <a href="site-filhotes.html">Filhotes</a>
      <a href="site-fotos.html">Fotos</a>
      <a href="site-videos.html">Vídeos</a>
      <a href="site-contato.html">Contato</a>
    </div>
    <p>© 2026 Criatório Goularth · Todos os direitos reservados</p>
  </footer>

  <script src="db-api.js"></script>
  <script>
    async function getPersonalizacao() {
      return (await DB.getConfig('site_personalizacao')) || {};
    }

    async function carregarLogo() {
      const personalizacao = await getPersonalizacao();
      const logoSection = document.getElementById('logo-section');
      
      const nome = personalizacao.nome || 'Criatório Goularth';
      const subtitulo = personalizacao.subtitulo || '';
      const iniciais = personalizacao.logoIniciais || 'CG';
      const logoUrl = personalizacao.logoUrl || '';
      const logoTamanho = personalizacao.logoTamanho || 76;
      const nomeTamanho = personalizacao.nomeTamanho || 20;
      
      let logoHtml = '';
      if (logoUrl) {
        logoHtml = `<img src="${logoUrl}" style="width:${logoTamanho}px;height:${logoTamanho}px;border-radius:50%;border:2px solid var(--brass);object-fit:cover;" onerror="this.parentElement.innerHTML='<div class=\\'mark\\' style=\\'width:${logoTamanho}px;height:${logoTamanho}px;font-size:${logoTamanho * 0.4}px;\\'>${iniciais}</div>'">`;
      } else {
        logoHtml = `<div class="mark" style="width:${logoTamanho}px;height:${logoTamanho}px;font-size:${logoTamanho * 0.4}px;">${iniciais}</div>`;
      }
      
      logoSection.innerHTML = `
        ${logoHtml}
        <div>
          <div class="name" style="font-size:${nomeTamanho}px;">${nome}</div>
          ${subtitulo ? `<div class="sub">${subtitulo}</div>` : ''}
        </div>
      `;
    }

    async function getFotos() {
      const fotos = await DB.getConfig('site_fotos');
      if (fotos && fotos.length > 0) return fotos;

      const conteudo = await DB.getConfig('site_conteudo');
      if (conteudo && conteudo.fotos && conteudo.fotos.length > 0) return conteudo.fotos;

      return [];
    }

    function abrirModal(url, titulo, descricao) {
      document.getElementById('modal-img').src = url;
      const legenda = titulo + (descricao ? ' - ' + descricao : '');
      document.getElementById('modal-legenda').textContent = legenda;
      document.getElementById('foto-modal').classList.add('open');
    }

    function fecharModal() {
      document.getElementById('foto-modal').classList.remove('open');
    }

    function switchTab(tabId, btn) {
      document.querySelectorAll('#fotos-tabs button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
    }

    async function renderizarFotos() {
      const fotos = await getFotos();

      const criacao = fotos.filter(f => f.categoria === 'Criação' || !f.categoria);
      const torneios = fotos.filter(f => f.categoria === 'Torneios');
      
      renderizarGrid('fotos-criacao-grid', criacao);
      renderizarGrid('fotos-torneios-grid', torneios);
    }

    function renderizarGrid(gridId, fotos) {
      const grid = document.getElementById(gridId);
      
      if (fotos.length === 0) {
        grid.innerHTML = `
          <div class="empty-fotos">
            <div class="icon">📸</div>
            <p>Nenhuma foto nesta categoria.</p>
          </div>
        `;
        return;
      }
      
      grid.innerHTML = fotos.map(foto => `
        <div class="foto-item" onclick="abrirModal('${foto.url}', '${foto.titulo || ''}', '${foto.descricao || ''}')">
          <img src="${foto.url}" alt="${foto.titulo || 'Foto'}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22%3E%3Crect fill=%22%231a2e28%22 width=%22200%22 height=%22200%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%239aa89e%22 font-size=%2214%22 font-family=%22sans-serif%22%3EImagem não encontrada%3C/text%3E%3C/svg%3E'">
          <div class="info">
            <div class="titulo">${foto.titulo || 'Sem título'}</div>
            ${foto.descricao ? `<div class="descricao">${foto.descricao}</div>` : ''}
            <span class="categoria">${foto.categoria || 'Criação'}</span>
          </div>
        </div>
      `).join('');
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') fecharModal();
    });

    carregarLogo();
    renderizarFotos();
  </script>
  <script src="site-buttons.js"></script>
</body>
</html>
